name: Generate Profile Widgets

on:
  schedule:
    - cron: "0 */12 * * *"   # Update otomatis setiap 12 jam
  workflow_dispatch:          # Bisa dijalankan manual dari tab Actions
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Buat folder output
        run: mkdir -p dist

      # 1) Snake contribution animation
      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 2) Kartu-kartu stats, di-generate LANGSUNG di dalam runner (tidak memanggil
      #    server github-readme-stats.vercel.app yang sedang di-pause pemiliknya).
      - name: Generate GitHub Stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=06B6D4&icon_color=06B6D4&text_color=c9d1d9&count_private=true"
          path: dist/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=06B6D4&text_color=c9d1d9"
          path: dist/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Pinned Repo card (WA-AKG)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=WA-AKG&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=06B6D4&icon_color=06B6D4&text_color=c9d1d9"
          path: dist/pin-wa-akg.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Pinned Repo card (WA-AKG-Business)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=WA-AKG-Business&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=06B6D4&icon_color=06B6D4&text_color=c9d1d9"
          path: dist/pin-wa-akg-business.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 3) Streak & Activity Graph masih dari layanan lain (belum dilaporkan mati),
      #    tetap di-cache jadi file statis untuk jaga-jaga kalau kena rate limit.
      - name: Cache Streak Stats card
        run: |
          curl -sL "https://streak-stats.demolab.com/?user=${{ github.repository_owner }}&theme=tokyonight&hide_border=true&background=0D1117&ring=06B6D4&fire=06B6D4&currStreakLabel=06B6D4" -o dist/streak.svg

      - name: Cache Activity Graph card
        run: |
          curl -sL "https://github-readme-activity-graph.vercel.app/graph?username=${{ github.repository_owner }}&theme=tokyo-night&hide_border=true&bg_color=0D1117&color=06B6D4&line=06B6D4&point=ffffff" -o dist/activity-graph.svg

      - name: Push ke branch output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
